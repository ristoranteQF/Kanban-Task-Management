<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <svg width="24" height="25" xmlns="http://www.w3.org/2000/svg">
          <g fill="#635FC7" fill-rule="evenodd">
            <rect width="6" height="25" rx="2"/>
            <rect opacity=".75" x="9" width="6" height="25" rx="2"/>
            <rect opacity=".5" x="18" width="6" height="25" rx="2"/>
          </g>
        </svg>
        <h1>kanban</h1>
      </div>
      <h2>Create your account</h2>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input 
          id="name" 
          type="text" 
          formControlName="name"
          [class.error]="name?.invalid && name?.touched"
          placeholder="Enter your name">
        <span class="error-message" *ngIf="name?.invalid && name?.touched">
          Name is required
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email"
          [class.error]="email?.invalid && email?.touched"
          placeholder="Enter your email">
        <span class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password"
          [class.error]="password?.invalid && password?.touched"
          placeholder="Enter your password">
        <span class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </span>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="signupForm.invalid || isLoading">
        {{ isLoading ? 'Creating account...' : 'Sign Up' }}
      </button>

      <p class="auth-link">
        Already have an account? <a routerLink="/login">Log in</a>
      </p>
    </form>
  </div>
</div>
