<header class="header">
  <div class="header-left">
    <button 
      *ngIf="!isSidebarOpen" 
      class="show-sidebar-btn" 
      (click)="onToggleSidebar()">
      <svg width="16" height="11" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.815 4.434A9.055 9.055 0 0 0 8 0 9.055 9.055 0 0 0 .185 4.434a1.333 1.333 0 0 0 0 1.354A9.055 9.055 0 0 0 8 10.222c3.33 0 6.25-1.777 7.815-4.434a1.333 1.333 0 0 0 0-1.354ZM8 8.89A3.776 3.776 0 0 1 4.222 5.11 3.776 3.776 0 0 1 8 1.333a3.776 3.776 0 0 1 3.778 3.778A3.776 3.776 0 0 1 8 8.89Zm2.889-3.778a2.889 2.889 0 1 1-5.438-1.36 1.19 1.19 0 1 0 1.19-1.189H6.64a2.889 2.889 0 0 1 4.25 2.549Z" fill="currentColor"/>
      </svg>
    </button>
    <h1>{{ currentBoard?.name || 'No Board Selected' }}</h1>
  </div>

  <div class="header-right">
    <button 
      class="btn-primary add-task-btn" 
      (click)="openAddTaskModal()"
      [disabled]="!currentBoard || currentBoard.columns.length === 0">
      <svg width="12" height="12" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFF" d="M7.368 12V7.344H12V4.632H7.368V0H4.656v4.632H0v2.712h4.656V12z"/>
      </svg>
      <span>Add New Task</span>
    </button>

    <div class="board-menu-container">
      <button class="menu-btn" (click)="toggleBoardMenu()" *ngIf="currentBoard">
        <svg width="5" height="20" xmlns="http://www.w3.org/2000/svg">
          <g fill="currentColor" fill-rule="evenodd">
            <circle cx="2.308" cy="2.308" r="2.308"/>
            <circle cx="2.308" cy="10" r="2.308"/>
            <circle cx="2.308" cy="17.692" r="2.308"/>
          </g>
        </svg>
      </button>

      <div class="dropdown-menu" *ngIf="showBoardMenu" (clickOutside)="showBoardMenu = false">
        <button (click)="editBoard()">Edit Board</button>
        <button class="delete" (click)="deleteBoard()">Delete Board</button>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Logout</span>
    </button>
  </div>
</header>

<app-task-modal
  *ngIf="showTaskModal"
  [board]="currentBoard!"
  (close)="closeTaskModal()"
  (taskCreated)="onTaskCreated()">
</app-task-modal>

<app-board-modal
  *ngIf="showEditBoardModal"
  [board]="currentBoard!"
  [isEditMode]="true"
  (close)="closeBoardModal()"
  (boardCreated)="onBoardUpdated()">
</app-board-modal>

<div class="modal-overlay" *ngIf="showDeleteConfirm" (click)="showDeleteConfirm = false">
  <div class="modal delete-modal" (click)="$event.stopPropagation()">
    
    <h2>Delete this board?</h2>
    
    <p>
      Are you sure you want to delete the '{{ currentBoard?.name }}' board? 
      This action will remove all columns and tasks and cannot be reversed.
    </p>
    
    <div class="modal-actions">
      <button class="btn-destructive" (click)="confirmDelete()">Delete</button>
      
      <button class="btn-secondary" (click)="showDeleteConfirm = false">Cancel</button>
    </div>

  </div>
</div>
