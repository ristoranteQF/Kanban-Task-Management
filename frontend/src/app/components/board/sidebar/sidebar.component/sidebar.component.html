<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <svg width="24" height="25" xmlns="http://www.w3.org/2000/svg">
        <g fill="#635FC7" fill-rule="evenodd">
          <rect width="6" height="25" rx="2"/>
          <rect opacity=".75" x="9" width="6" height="25" rx="2"/>
          <rect opacity=".5" x="18" width="6" height="25" rx="2"/>
        </g>
      </svg>
      <h1>kanban</h1>
    </div>
  </div>

  <div class="boards-section">
    <h2>ALL BOARDS ({{ boards.length }})</h2>
    <ul class="board-list">
      <li *ngFor="let board of boards" 
          [class.active]="board.id === currentBoard?.id"
          (click)="selectBoard(board)">
        <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 2.889A2.889 2.889 0 0 1 2.889 0H13.11A2.889 2.889 0 0 1 16 2.889V13.11A2.888 2.888 0 0 1 13.111 16H2.89A2.889 2.889 0 0 1 0 13.111V2.89Zm1.333 5.555v4.667c0 .859.697 1.556 1.556 1.556h6.889V8.444H1.333Zm8.445-1.333V1.333h-6.89A1.556 1.556 0 0 0 1.334 2.89V7.11h8.445Zm4.889-1.333H11.11v4.444h3.556V5.778Zm0 5.778H11.11v3.11h2a1.556 1.556 0 0 0 1.556-1.555v-1.555Zm0-7.112V2.89a1.555 1.555 0 0 0-1.556-1.556h-2v3.111h3.556Z" fill="currentColor"/>
        </svg>
        <span>{{ board.name }}</span>
      </li>
      <li class="create-board" (click)="openCreateBoardModal()">
        <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 2.889A2.889 2.889 0 0 1 2.889 0H13.11A2.889 2.889 0 0 1 16 2.889V13.11A2.888 2.888 0 0 1 13.111 16H2.89A2.889 2.889 0 0 1 0 13.111V2.89Zm1.333 5.555v4.667c0 .859.697 1.556 1.556 1.556h6.889V8.444H1.333Zm8.445-1.333V1.333h-6.89A1.556 1.556 0 0 0 1.334 2.89V7.11h8.445Zm4.889-1.333H11.11v4.444h3.556V5.778Zm0 5.778H11.11v3.11h2a1.556 1.556 0 0 0 1.556-1.555v-1.555Zm0-7.112V2.89a1.555 1.555 0 0 0-1.556-1.556h-2v3.111h3.556Z" fill="currentColor"/>
        </svg>
        <span>+ Create New Board</span>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="theme-toggle">
      <svg width="19" height="19" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.167 15.833a.833.833 0 0 1 .833.834v.833a.833.833 0 0 1-1.667 0v-.833a.833.833 0 0 1 .834-.834ZM3.75 13.75a.833.833 0 0 1 .59 1.422l-.59.59a.833.833 0 0 1-1.18-1.178l.59-.59a.833.833 0 0 1 .59-.244Zm10.833 0c.221 0 .433.088.59.244l.59.59a.833.833 0 0 1-1.18 1.178l-.59-.59a.833.833 0 0 1 .59-1.422ZM9.167 5a4.167 4.167 0 1 1 0 8.334 4.167 4.167 0 0 1 0-8.334Zm-7.5 3.333a.833.833 0 0 1 0 1.667H.833a.833.833 0 1 1 0-1.667h.834Zm15.833 0a.833.833 0 0 1 0 1.667h-.833a.833.833 0 0 1 0-1.667h.833Zm-1.667-6.666a.833.833 0 0 1 .59 1.422l-.59.59a.833.833 0 1 1-1.178-1.18l.59-.59a.833.833 0 0 1 .588-.244Zm-13.333 0c.221 0 .433.088.59.244l.59.59a.833.833 0 1 1-1.18 1.18l-.59-.59a.833.833 0 0 1 .59-1.422ZM9.167 0A.833.833 0 0 1 10 .833v.834a.833.833 0 1 1-1.667 0V.833A.833.833 0 0 1 9.167 0Z" fill="currentColor"/>
      </svg>
      <label class="switch">
        <input type="checkbox" (change)="toggleTheme()" [checked]="isDarkMode">
        <span class="slider"></span>
      </label>
      <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.474.682c.434-.11.718.406.481.78A6.067 6.067 0 0 0 6.01 4.72c0 3.418 2.827 6.187 6.314 6.187.89.002 1.77-.182 2.584-.54.408-.18.894.165.894.615 0 .355-.206.673-.508.842a8.657 8.657 0 0 1-4.097.98C4.993 12.804.68 8.538.68 3.362 0 1.642.962.24 2.656.04a8.555 8.555 0 0 1 3.818.642Z" fill="currentColor"/>
      </svg>
    </div>

    <button class="hide-sidebar-btn" (click)="onToggleSidebar()">
      <svg width="18" height="16" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.522 11.223a4.252 4.252 0 0 1-3.654-5.22l3.654 5.22ZM9 12.25A8.685 8.685 0 0 1 1.5 8a8.612 8.612 0 0 1 2.76-2.864l-.86-1.23A10.112 10.112 0 0 0 .208 7.238a1.5 1.5 0 0 0 0 1.524A10.187 10.187 0 0 0 9 13.75c.414 0 .828-.025 1.239-.074l-1-1.43A8.88 8.88 0 0 1 9 12.25Zm8.792-3.488a10.14 10.14 0 0 1-4.486 4.046l1.504 2.148a.375.375 0 0 1-.092.523l-.648.453a.375.375 0 0 1-.523-.092L3.19 1.044A.375.375 0 0 1 3.282.52L3.93.068a.375.375 0 0 1 .523.092l1.735 2.479A10.308 10.308 0 0 1 9 2.25c3.746 0 7.031 2 8.792 4.988a1.5 1.5 0 0 1 0 1.524ZM16.5 8a8.674 8.674 0 0 0-6.755-4.219A1.75 1.75 0 1 0 12.75 5v-.001a4.25 4.25 0 0 1-1.154 5.366l.834 1.192A8.641 8.641 0 0 0 16.5 8Z" fill="currentColor"/>
      </svg>
      <span>Hide Sidebar</span>
    </button>
  </div>
</aside>

<app-board-modal 
  *ngIf="showBoardModal"
  (close)="closeBoardModal()"
  (boardCreated)="onBoardCreated()">
</app-board-modal>
